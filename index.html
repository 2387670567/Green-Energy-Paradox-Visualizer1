<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Energy Paradox Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 现代无衬线字体，提升高级感 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #334155;
            margin: 0;
            overflow-x: hidden;
        }

        /* 动态弥散光影背景 */
        .bg-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 10% 20%, rgba(254, 205, 211, 0.4) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(167, 243, 208, 0.4) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(186, 230, 253, 0.3) 0px, transparent 50%);
            position: fixed;
            inset: 0;
            z-index: -2;
        }

        /* 辅助网格纹理 */
        .bg-grid {
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='rgba(100,116,139,0.1)'/%3E%3C/svg%3E");
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* 毛玻璃主容器 */
        .glass-container {
            position: relative;
            width: 1100px;
            height: 650px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 
                        inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .node-group {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            transform-box: fill-box;
        }

        .node-group:hover {
            transform: scale(1.03) translateY(-2px);
        }

        .node-group:hover .node-bg {
            stroke-width: 2;
            stroke: #3b82f6;
            filter: drop-shadow(0 10px 15px rgba(59,130,246,0.15));
        }

        /* 数据流向动画 */
        .flow-line {
            fill: none;
            stroke-width: 2.5;
            stroke-dasharray: 6, 6;
            animation: flowAnim 15s linear infinite;
        }

        @keyframes flowAnim {
            to { stroke-dashoffset: -100; }
        }

        /* 呼吸光环动画 */
        .pulse-ring {
            animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* 悬浮提示框 (毛玻璃风格) */
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            color: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            pointer-events: none;
            display: none;
            z-index: 100;
            width: 260px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <!-- 底层背景 -->
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    
    <div class="glass-container" id="diagram-container">
        <svg id="main-svg" width="1100" height="650" viewBox="0 0 1100 650">
            <!-- 渐变与滤镜定义 -->
            <defs>
                <!-- 阴影效果 -->
                <filter id="card-shadow" x="-10%" y="-10%" width="130%" height="130%">
                    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#cbd5e1" flood-opacity="0.5"/>
                </filter>
                <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.3"/>
                </filter>

                <!-- 路径渐变色 -->
                <linearGradient id="grad-left" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#f43f5e" />
                    <stop offset="100%" stop-color="#60a5fa" />
                </linearGradient>
                <linearGradient id="grad-right" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#60a5fa" />
                    <stop offset="100%" stop-color="#10b981" />
                </linearGradient>

                <!-- 箭头标记 -->
                <marker id="arrow-left" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="#818cf8" />
                </marker>
                <marker id="arrow-right" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="#34d399" />
                </marker>
            </defs>

            <!-- ================= 左侧：极端气候驱动 ================= -->
            <!-- 连接线 -->
            <path class="flow-line" stroke="url(#grad-left)" d="M 220 325 C 320 325, 360 100, 440 100" marker-end="url(#arrow-left)"/>
            <path class="flow-line" stroke="url(#grad-left)" d="M 220 325 C 320 325, 360 210, 440 210" marker-end="url(#arrow-left)"/>
            <path class="flow-line" stroke="url(#grad-left)" d="M 220 325 C 320 325, 360 320, 440 320" marker-end="url(#arrow-left)"/>
            <path class="flow-line" stroke="url(#grad-left)" d="M 220 325 C 320 325, 360 430, 440 430" marker-end="url(#arrow-left)"/>
            <path class="flow-line" stroke="url(#grad-left)" d="M 220 325 C 320 325, 360 540, 440 540" marker-end="url(#arrow-left)"/>

            <!-- 连接线上的文字标签，填补空白 -->
            <rect x="300" y="220" width="110" height="24" rx="12" fill="#ffffff" filter="url(#card-shadow)" opacity="0.9"/>
            <text x="355" y="236" text-anchor="middle" font-size="10px" font-weight="600" fill="#64748b">Physical Damage</text>
            <rect x="300" y="420" width="110" height="24" rx="12" fill="#ffffff" filter="url(#card-shadow)" opacity="0.9"/>
            <text x="355" y="436" text-anchor="middle" font-size="10px" font-weight="600" fill="#64748b">Structural Failure</text>

            <g id="left-section">
                <!-- 核心红圈 -->
                <circle cx="120" cy="325" r="70" fill="#fff1f2" stroke="#fda4af" stroke-width="2" filter="url(#soft-shadow)"/>
                <circle cx="120" cy="325" r="85" fill="none" stroke="#f43f5e" stroke-width="1.5" class="pulse-ring"/>
                
                <text x="120" y="300" text-anchor="middle" font-weight="700" fill="#be123c" font-size="14px">Extreme Climate</text>
                <text x="120" y="335" text-anchor="middle" font-weight="800" fill="#e11d48" font-size="28px">$2.9T</text>
                <text x="120" y="355" text-anchor="middle" fill="#f43f5e" font-size="11px">Economic Losses (10 Yr)</text>
                
                <!-- 图标点缀 -->
                <path d="M100 270 Q 120 250 140 270" fill="none" stroke="#fda4af" stroke-width="2"/>
                <path d="M110 265 L 120 250 L 130 265" fill="none" stroke="#fda4af" stroke-width="2"/>
            </g>


            <!-- ================= 右侧：生态受体 ================= -->
            <!-- 连接线 -->
            <path class="flow-line" stroke="url(#grad-right)" d="M 680 100 C 760 100, 780 130, 850 130" marker-end="url(#arrow-right)"/>
            <path class="flow-line" stroke="url(#grad-right)" d="M 680 210 C 760 210, 780 205, 850 205" marker-end="url(#arrow-right)"/>
            <path class="flow-line" stroke="url(#grad-right)" d="M 680 320 C 760 320, 780 280, 850 280" marker-end="url(#arrow-right)"/>
            <path class="flow-line" stroke="url(#grad-right)" d="M 680 430 C 760 430, 780 355, 850 355" marker-end="url(#arrow-right)"/>
            <path class="flow-line" stroke="url(#grad-right)" d="M 680 540 C 760 540, 780 430, 850 430" marker-end="url(#arrow-right)"/>
            <path class="flow-line" stroke="url(#grad-right)" d="M 680 540 C 760 540, 780 505, 850 505" marker-end="url(#arrow-right)"/>

            <!-- 连接线标签 -->
            <rect x="710" y="240" width="110" height="24" rx="12" fill="#ffffff" filter="url(#card-shadow)" opacity="0.9"/>
            <text x="765" y="256" text-anchor="middle" font-size="10px" font-weight="600" fill="#64748b">Chemical Cascade</text>
            <rect x="710" y="440" width="110" height="24" rx="12" fill="#ffffff" filter="url(#card-shadow)" opacity="0.9"/>
            <text x="765" y="456" text-anchor="middle" font-size="10px" font-weight="600" fill="#64748b">Toxic Emissions</text>

            <g id="right-section">
                <!-- 生态边界框 -->
                <rect x="830" y="80" width="230" height="480" rx="16" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#soft-shadow)"/>
                <text x="945" y="105" text-anchor="middle" font-weight="800" fill="#065f46" font-size="14px" letter-spacing="1">ECOLOGICAL RECEPTORS</text>

                <!-- 具体的生态受体条目 -->
                <g transform="translate(845, 115)">
                    <rect width="200" height="42" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
                    <circle cx="20" cy="21" r="5" fill="#34d399"/>
                    <text x="35" y="25" font-size="12px" font-weight="600" fill="#1e293b">Soil Microbes & N-Cycle</text>
                </g>
                <g transform="translate(845, 190)">
                    <rect width="200" height="42" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
                    <circle cx="20" cy="21" r="5" fill="#3b82f6"/>
                    <text x="35" y="25" font-size="12px" font-weight="600" fill="#1e293b">Marine Food Chain (BPA)</text>
                </g>
                <g transform="translate(845, 265)">
                    <rect width="200" height="42" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
                    <circle cx="20" cy="21" r="5" fill="#a855f7"/>
                    <text x="35" y="25" font-size="12px" font-weight="600" fill="#1e293b">Drinking Water Safety (HF)</text>
                </g>
                <g transform="translate(845, 340)">
                    <rect width="200" height="42" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
                    <circle cx="20" cy="21" r="5" fill="#f59e0b"/>
                    <text x="35" y="25" font-size="12px" font-weight="600" fill="#1e293b">Riverine Thermal Stress</text>
                </g>
                <g transform="translate(845, 415)">
                    <rect width="200" height="42" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
                    <circle cx="20" cy="21" r="5" fill="#ef4444"/>
                    <text x="35" y="25" font-size="12px" font-weight="600" fill="#1e293b">MeHg Accumulation</text>
                </g>
                <g transform="translate(845, 490)">
                    <rect width="200" height="42" rx="8" fill="#ffffff" filter="url(#card-shadow)"/>
                    <circle cx="20" cy="21" r="5" fill="#10b981"/>
                    <text x="35" y="25" font-size="12px" font-weight="600" fill="#1e293b">Algal Bloom & Delta Decay</text>
                </g>
            </g>


            <!-- ================= 中间：能源分支 (卡片化设计) ================= -->
            <g id="center-section">
                
                <!-- PV Node -->
                <g class="node-group" onclick="showInfo('PV')" transform="translate(440, 65)">
                    <rect class="node-bg" width="240" height="70" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" filter="url(#card-shadow)"/>
                    <!-- Icon Box -->
                    <rect x="10" y="15" width="40" height="40" rx="8" fill="#fffbeb"/>
                    <path d="M22 25 L38 25 L38 45 L22 45 Z M22 30 L38 30 M22 35 L38 35 M22 40 L38 40 M27 25 L27 45 M32 25 L32 45" stroke="#d97706" stroke-width="1.5" fill="none"/>
                    <!-- Text -->
                    <text x="62" y="32" font-weight="700" fill="#0f172a" font-size="14px">Solar PV</text>
                    <text x="62" y="50" font-size="11px" font-weight="500" fill="#64748b">Intensity: 5-7 t/MW</text>
                    <rect x="180" y="28" width="45" height="18" rx="4" fill="#f8fafc"/>
                    <text x="202.5" y="40" text-anchor="middle" font-size="9px" font-weight="700" fill="#94a3b8">Pb, Cd</text>
                </g>

                <!-- Wind Node -->
                <g class="node-group" onclick="showInfo('Wind')" transform="translate(440, 175)">
                    <rect class="node-bg" width="240" height="70" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" filter="url(#card-shadow)"/>
                    <rect x="10" y="15" width="40" height="40" rx="8" fill="#eff6ff"/>
                    <circle cx="30" cy="35" r="3" fill="#2563eb"/>
                    <path d="M30 35 C35 20, 45 25, 30 35 C20 45, 20 20, 30 35 C40 45, 15 40, 30 35" stroke="#2563eb" stroke-width="1.5" fill="none"/>
                    
                    <text x="62" y="32" font-weight="700" fill="#0f172a" font-size="14px">Wind Power</text>
                    <text x="62" y="50" font-size="11px" font-weight="500" fill="#64748b">Intensity: 120-150 t/MW</text>
                    <rect x="180" y="28" width="45" height="18" rx="4" fill="#f8fafc"/>
                    <text x="202.5" y="40" text-anchor="middle" font-size="9px" font-weight="700" fill="#94a3b8">BPA</text>
                </g>

                <!-- Storage Node -->
                <g class="node-group" onclick="showInfo('Storage')" transform="translate(440, 285)">
                    <rect class="node-bg" width="240" height="70" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" filter="url(#card-shadow)"/>
                    <rect x="10" y="15" width="40" height="40" rx="8" fill="#faf5ff"/>
                    <rect x="22" y="22" width="16" height="26" rx="2" stroke="#9333ea" stroke-width="1.5" fill="none"/>
                    <rect x="26" y="19" width="8" height="3" fill="#9333ea"/>
                    <path d="M30 28 L27 35 L33 35 L30 42" stroke="#9333ea" stroke-width="1.5" fill="none"/>
                    
                    <text x="62" y="32" font-weight="700" fill="#0f172a" font-size="14px">BESS (Storage)</text>
                    <text x="62" y="50" font-size="11px" font-weight="500" fill="#64748b">Intensity: 10-15 t/MW</text>
                    <rect x="180" y="28" width="45" height="18" rx="4" fill="#f8fafc"/>
                    <text x="202.5" y="40" text-anchor="middle" font-size="9px" font-weight="700" fill="#94a3b8">Li, Co, HF</text>
                </g>

                <!-- Nuclear Node -->
                <g class="node-group" onclick="showInfo('Nuclear')" transform="translate(440, 395)">
                    <rect class="node-bg" width="240" height="70" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" filter="url(#card-shadow)"/>
                    <rect x="10" y="15" width="40" height="40" rx="8" fill="#fdf4ff"/>
                    <circle cx="30" cy="35" r="4" fill="#c026d3"/>
                    <ellipse cx="30" cy="35" rx="12" ry="4" stroke="#c026d3" stroke-width="1.5" fill="none" transform="rotate(45 30 35)"/>
                    <ellipse cx="30" cy="35" rx="12" ry="4" stroke="#c026d3" stroke-width="1.5" fill="none" transform="rotate(-45 30 35)"/>
                    
                    <text x="62" y="32" font-weight="700" fill="#0f172a" font-size="14px">Nuclear Energy</text>
                    <text x="62" y="50" font-size="11px" font-weight="500" fill="#64748b">Intensity: 40-50 t/MW</text>
                    <rect x="180" y="28" width="45" height="18" rx="4" fill="#f8fafc"/>
                    <text x="202.5" y="40" text-anchor="middle" font-size="9px" font-weight="700" fill="#94a3b8">Thermal</text>
                </g>

                <!-- Hydro Node -->
                <g class="node-group" onclick="showInfo('Hydro')" transform="translate(440, 505)">
                    <rect class="node-bg" width="240" height="70" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" filter="url(#card-shadow)"/>
                    <rect x="10" y="15" width="40" height="40" rx="8" fill="#f0fdfa"/>
                    <path d="M20 35 Q 25 25, 30 35 T 40 35" stroke="#0d9488" stroke-width="2" fill="none"/>
                    <path d="M20 42 Q 25 32, 30 42 T 40 42" stroke="#0d9488" stroke-width="2" fill="none"/>
                    
                    <text x="62" y="32" font-weight="700" fill="#0f172a" font-size="14px">Hydropower</text>
                    <text x="62" y="50" font-size="11px" font-weight="500" fill="#64748b">Intensity: 60-70 t/MW</text>
                    <rect x="180" y="28" width="45" height="18" rx="4" fill="#f8fafc"/>
                    <text x="202.5" y="40" text-anchor="middle" font-size="9px" font-weight="700" fill="#94a3b8">MeHg</text>
                </g>
            </g>

            <!-- ================= 嵌入式洞察面板 (填补空白区域) ================= -->
            <g transform="translate(30, 480)">
                <rect width="320" height="140" rx="16" fill="rgba(255,255,255,0.7)" stroke="rgba(255,255,255,0.9)" filter="url(#card-shadow)"/>
                <text x="20" y="30" font-weight="800" fill="#1e293b" font-size="14px">Core Insights</text>
                
                <circle cx="25" cy="55" r="4" fill="#3b82f6"/>
                <text x="40" y="59" font-size="11px" font-weight="600" fill="#334155">Material Shift:</text>
                <foreignObject x="40" y="65" width="260" height="40">
                    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 10px; color: #64748b; line-height: 1.4;">
                        Low-carbon transition shifts burden from "fuels" to "minerals", increasing chemical exposure risks.
                    </div>
                </foreignObject>

                <circle cx="25" cy="105" r="4" fill="#ef4444"/>
                <text x="40" y="109" font-size="11px" font-weight="600" fill="#334155">Non-linear Vulnerability:</text>
                <foreignObject x="40" y="115" width="260" height="40">
                    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 10px; color: #64748b; line-height: 1.4;">
                        Extreme weather triggers unexpected secondary pollution, coupling energy and ecology.
                    </div>
                </foreignObject>
            </g>

        </svg>

        <!-- Tooltip -->
        <div id="tooltip" class="tooltip"></div>
    </div>

    <script>
        const info = {
            'PV': '<strong class="text-amber-400 text-sm border-b border-slate-600 pb-1 mb-2 block">Solar PV Leakage</strong>Solar components encapsulate Pb and Cd. Severe hail impact fracturing glass covers can lead to a <b>62%</b> cumulative leaching rate of Cd within 360 days under acidic conditions (pH=3.0).',
            'Wind': '<strong class="text-blue-400 text-sm border-b border-slate-600 pb-1 mb-2 block">Wind Turbine Erosion</strong>High-speed tip erosion (80-100 m/s) against heavy rain releases microplastics. A single 15MW offshore turbine can emit <b>~240g</b> of epoxy resins/BPA annually into the marine ecosystem.',
            'Storage': '<strong class="text-purple-400 text-sm border-b border-slate-600 pb-1 mb-2 block">BESS Thermal Runaway</strong>Thermal runaway triggered by floods/heatwaves causes electrolyte hydrolysis, releasing highly toxic <b>HF</b> and <b>POF3</b> gas, with firefighting runoff severely contaminating downstream water.',
            'Nuclear': '<strong class="text-fuchsia-400 text-sm border-b border-slate-600 pb-1 mb-2 block">Nuclear Heat Sink Loss</strong>Extreme heatwaves dramatically reduce cooling efficiency. A 1°C rise in river water temperature drops reactor efficiency by up to 2%, causing severe thermal stress to aquatic life downstream.',
            'Hydro': '<strong class="text-teal-400 text-sm border-b border-slate-600 pb-1 mb-2 block">Hydropower Pulse Effect</strong>Extreme flood pulses disturb anoxic reservoir sediments, triggering a <b>40x spike</b> in Methylmercury (MeHg) production, which bio-accumulates up the food chain.'
        };

        const tooltip = document.getElementById('tooltip');

        function showInfo(key) {
            const content = info[key];
            const event = window.event;
            
            tooltip.innerHTML = content;
            tooltip.style.display = 'block';
            
            // Adjust position to avoid overflowing window
            let leftPos = event.pageX + 15;
            let topPos = event.pageY + 15;
            if (leftPos + 260 > window.innerWidth) leftPos = event.pageX - 280;
            
            tooltip.style.left = leftPos + 'px';
            tooltip.style.top = topPos + 'px';

            setTimeout(() => {
                tooltip.style.display = 'none';
            }, 8000); // 增加停留时间，方便阅读
        }

        window.onclick = function(event) {
            if (!event.target.closest('.node-group')) {
                tooltip.style.display = 'none';
            }
        }
    </script>
</body>
</html>
